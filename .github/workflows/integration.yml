name: Integration

on:
    pull_request:
        branches: [main]
    workflow_call:

jobs:
    integration:
        name: Integration
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: '24'

            - name: Install dependencies
              run: npm ci

            - name: Typecheck
              run: npm run typecheck

            - name: Build
              run: npm run build

            - name: Test
              run: npm test
